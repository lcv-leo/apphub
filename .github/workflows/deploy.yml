# .github/workflows/deploy.yml
name: Deploy Automático para Cloudflare Pages

on:
  push:
    branches:
      - main # Repositório GitHub: branch principal

# 🛡️ Hotfix v3.01.01: Força os runners do GitHub a usarem a arquitetura moderna (Node 24)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    
    steps:
      - name: Checkout do código-fonte
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Deploy no Cloudflare Pages
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=app-hub --branch=production
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
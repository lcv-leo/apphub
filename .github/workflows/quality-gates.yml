name: Quality Gates (Segurança, Quebras e Órfãos)

on:
  pull_request:
    branches:
      - main # Repositório GitHub: validação em PR para a branch principal
  push:
    branches:
      - main # Repositório GitHub: validação contínua na branch principal

jobs:
  audit-static:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout do código
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: latest
          check-latest: true

      - name: Validar pinning SHA das GitHub Actions
        run: node .github/scripts/audit-actions-pinning.mjs

      - name: Executar auditoria estática do Hub
        run: node .github/scripts/audit-static.mjs

      - name: Checar disponibilidade de links externos (não bloqueante)
        run: node .github/scripts/audit-external-links.mjs --timeout=4500 --concurrency=3

      - name: Validar snapshot estrutural do catálogo
        run: node .github/scripts/audit-structure-snapshot.mjs

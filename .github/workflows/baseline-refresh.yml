name: Baseline Refresh (Manual)

on:
  workflow_dispatch:
    inputs:
      reason:
        description: Motivo da atualização do baseline estrutural
        required: true
        type: string

jobs:
  refresh-baseline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do código
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: latest
          check-latest: true

      - name: Atualizar baseline estrutural
        run: node .github/scripts/audit-structure-snapshot.mjs --update

      - name: Validar baseline atualizado
        run: node .github/scripts/audit-structure-snapshot.mjs

      - name: Commit automático do baseline
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          commit_message: "chore(ci): refresh estrutura baseline [manual]"
          file_pattern: .github/baselines/hub-structure.snapshot.json

# Módulo: .github/dependabot.yml (v3.0.0)
# Nota: apphub migrado para React 19 + TypeScript + Vite — dependências NPM ativas.
version: 2
updates:
  # ---------------------------------------------------------
  # INFRAESTRUTURA: Esteiras de CI/CD (GitHub Actions)
  # ---------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Sao_Paulo"
    labels:
      - "ci-cd"
      - "github-actions"
      - "security"
    assignees:
      - "lcv-leo"
    commit-message:
      prefix: "ci"
      include: "scope"
    open-pull-requests-limit: 5

  # ---------------------------------------------------------
  # DEPENDÊNCIAS: NPM (React, Vite, TypeScript)
  # ---------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Sao_Paulo"
    labels:
      - "dependencies"
      - "npm"
      - "security"
    assignees:
      - "lcv-leo"
    commit-message:
      prefix: "deps"
      include: "scope"
    open-pull-requests-limit: 10
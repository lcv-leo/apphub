# Módulo: .github/dependabot.yml (v2.0.0)
# Nota: apphub é um app estático (HTML/CSS/JS), sem dependências NPM.
version: 2
updates:
  # ---------------------------------------------------------
  # INFRAESTRUTURA: Esteiras de CI/CD (GitHub Actions)
  # ---------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Sao_Paulo"
    labels:
      - "ci-cd"
      - "github-actions"
      - "security"
    assignees:
      - "lcv-leo"
    commit-message:
      prefix: "ci"
      include: "scope"
    open-pull-requests-limit: 5
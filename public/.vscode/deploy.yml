# .github/workflows/deploy.yml
name: Deploy Automático para Cloudflare Pages

on:
  push:
    branches:
      - production # Trigger de automação ajustado para a branch production

# 🛡️ Hotfix v3.01.01: Força os runners do GitHub a usarem a arquitetura moderna (Node 24)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    
    steps:
      - name: Checkout do código-fonte
        uses: actions/checkout@v4

      - name: Deploy no Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: 'app-hub' # Substitua pelo nome exato do projeto no painel da Cloudflare
          directory: 'public' 
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: production # Direcionamento explícito para o ambiente de produção
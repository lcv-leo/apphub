<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta name="color-scheme" content="light dark">
    <title>Portal de Apps</title>
    <link rel="stylesheet" href="./styles.css">
    <script src="./app.js" defer></script>
</head>
<body>
    <a class="skip-link" href="#app">Pular para o conteúdo principal</a>

    <div class="bg-orb orb-1" aria-hidden="true"></div>
    <div class="bg-orb orb-2" aria-hidden="true"></div>
    <div class="bg-orb orb-3" aria-hidden="true"></div>

    <main class="layout" id="app" aria-live="polite">
        <header class="hero md3-surface glass">
            <h1>Portal de Apps</h1>
        </header>

        <section class="catalog" aria-labelledby="section-open-title">
            <h2 id="section-open-title"><span class="status-dot open"></span>Acesso Liberado</h2>
            <div class="card-grid" id="cards-open"></div>
        </section>

        <noscript>
            <section class="catalog md3-surface glass noscript-fallback" aria-labelledby="noscript-title">
                <h2 id="noscript-title">Modo sem JavaScript</h2>
                <p>JavaScript está desativado. Ative-o para carregar automaticamente o catálogo dinâmico de apps.</p>
            </section>
        </noscript>
    </main>

    <footer class="app-footer md3-surface glass">
        <p>&copy; <span id="year"></span> Portal de Apps | Leonardo Cardozo Vargas</p>
        <p class="app-version" title="Versionamento Semântico"><span id="hub-version-text">APP v03.03.01</span></p>
    </footer>
</body>
</html>
